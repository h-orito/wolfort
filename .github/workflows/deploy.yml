name: delivery

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  delivery:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: wolfort
    steps:
      - name: clone repository
        uses: actions/checkout@v4

      - name: login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: >
          docker build
          -t ghcr.io/h-orito/${{ env.IMAGE_NAME }}:latest .

      - name: push
        run: docker push ghcr.io/h-orito/${{ env.IMAGE_NAME }}:latest
